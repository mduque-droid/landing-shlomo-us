<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Body -->
  <ellipse cx="50" cy="60" rx="25" ry="35" fill="#000000"/>

  <!-- White belly -->
  <ellipse cx="50" cy="65" rx="18" ry="28" fill="#FFFFFF"/>

  <!-- Head -->
  <circle cx="50" cy="25" r="20" fill="#000000"/>

  <!-- White face -->
  <ellipse cx="50" cy="28" rx="15" ry="17" fill="#FFFFFF"/>

  <!-- Eyes -->
  <circle cx="42" cy="20" r="3" fill="#000000"/>
  <circle cx="58" cy="20" r="3" fill="#000000"/>

  <!-- Eye highlights -->
  <circle cx="43" cy="19" r="1" fill="#FFFFFF"/>
  <circle cx="59" cy="19" r="1" fill="#FFFFFF"/>

  <!-- Beak -->
  <polygon points="50,26 47,32 53,32" fill="#FF9800"/>

  <!-- Left wing -->
  <ellipse cx="30" cy="55" rx="8" ry="22" fill="#000000"/>

  <!-- Right wing -->
  <ellipse cx="70" cy="55" rx="8" ry="22" fill="#000000"/>

  <!-- Feet -->
  <ellipse cx="42" cy="92" rx="6" ry="5" fill="#FF9800"/>
  <ellipse cx="58" cy="92" rx="6" ry="5" fill="#FF9800"/>
</svg>